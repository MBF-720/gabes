<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Gabès Sentinel</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#191c1d",
                        "outline": "#727785",
                        "on-tertiary-container": "#f7fff1",
                        "secondary-container": "#b7ccfd",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-dim": "#d9dadb",
                        "primary": "#0058bd",
                        "secondary-fixed-dim": "#b1c6f7",
                        "inverse-surface": "#2e3132",
                        "outline-variant": "#c2c6d5",
                        "on-surface-variant": "#424753",
                        "background": "#f8f9fa",
                        "on-tertiary-fixed": "#002105",
                        "error-container": "#ffdad6",
                        "surface": "#f8f9fa",
                        "tertiary": "#0d6b24",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#e1e3e4",
                        "surface-variant": "#e1e3e4",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container": "#edeeef",
                        "on-secondary-container": "#415680",
                        "primary-container": "#2771df",
                        "surface-container-low": "#f3f4f5",
                        "primary-fixed-dim": "#adc6ff",
                        "on-secondary-fixed-variant": "#31466f",
                        "on-tertiary-fixed-variant": "#005318",
                        "inverse-primary": "#adc6ff",
                        "on-primary-fixed-variant": "#004494",
                        "secondary": "#495e89",
                        "surface-bright": "#f8f9fa",
                        "on-primary-fixed": "#001a41",
                        "tertiary-container": "#30853b",
                        "tertiary-fixed": "#9ff79f",
                        "secondary-fixed": "#d8e2ff",
                        "tertiary-fixed-dim": "#83da85",
                        "on-primary-container": "#fefcff",
                        "on-surface": "#191c1d",
                        "primary-fixed": "#d8e2ff",
                        "surface-tint": "#005ac1",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#001a41",
                        "surface-container-high": "#e7e8e9",
                        "inverse-on-surface": "#f0f1f2"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        h1, h2, h3, h4, h5, h6, .font-headline {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface min-h-screen flex items-center justify-center relative overflow-hidden text-on-surface">
<!-- Atmospheric Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary/5 blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-container/20 blur-[150px] pointer-events-none"></div>
<!-- Login Container -->
<main class="w-full max-w-md px-6 z-10">
<!-- Glassmorphism Card -->
<div class="bg-surface-container-lowest/80 backdrop-blur-[32px] rounded-xl p-8 sm:p-12 shadow-[0_40px_80px_-20px_rgba(25,28,29,0.08)] relative border border-outline-variant/10">
<!-- Brand subtle anchor -->
<div class="flex items-center justify-center mb-10 text-primary">
<span class="material-symbols-outlined mr-2" style="font-variation-settings: 'FILL' 1;">cleaning_services</span>
<span class="font-headline font-bold tracking-tight">Gabès Sentinel</span>
</div>
<!-- Header -->
<div class="text-center mb-10">
<h1 class="font-headline text-4xl sm:text-[3.5rem] leading-tight font-extrabold text-on-surface tracking-tight mb-2">Welcome back</h1>
<p class="text-secondary font-body text-sm mt-3">Access your environmental monitoring dashboard.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-2" for="email">Email address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest border-0 rounded-lg text-on-surface placeholder-outline focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all duration-300 outline-none" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex items-center justify-between ml-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest border-0 rounded-lg text-on-surface placeholder-outline focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all duration-300 outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-8 py-4 px-6 bg-gradient-to-b from-primary to-primary-container text-white rounded-full font-headline font-bold text-lg shadow-[0_20px_40px_-10px_rgba(0,88,189,0.25)] hover:shadow-[0_25px_50px_-12px_rgba(0,88,189,0.35)] hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center group" type="submit">
                    Sign In
                    <span class="material-symbols-outlined ml-2 group-hover:translate-x-1 transition-transform duration-300">arrow_forward</span>
</button>
</form>
<!-- Footer -->
<div class="mt-10 text-center font-body text-sm text-secondary">
                Don't have an account? 
                <a class="font-bold text-primary hover:text-primary-container ml-1 transition-colors" href="#">Sign Up</a>
</div>
</div>
</main>
</body></html>
